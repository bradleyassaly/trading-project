# Operator setup notes:
# - Replace the example SMTP host, username, sender, and recipient values below before enabling real email sending.
# - Keep the SMTP password out of the repo and supply it through the env var named in smtp_password_env_var.
# - Leave sms_enabled false unless you have a real high-severity SMS routing target configured.
email_enabled: true
sms_enabled: false
# Replace with your real SMTP server, for example smtp.sendgrid.net or your mail provider host.
smtp_host: smtp.gmail.com
smtp_port: 587
# Replace with the SMTP login for your provider.
smtp_username: bradleyassaly@gmail.com
smtp_password_env_var: TRADING_PLATFORM_SMTP_PASSWORD
smtp_use_tls: true
# Replace with the sender identity your SMTP provider allows.
email_from: bradleyassaly@gmail.com
# Replace with the real operator inbox or distribution list.
email_to:
  - bradleyassaly@gmail.com
subject_prefix: Trading Platform
email_min_severity: info
sms_provider: stub
sms_target: []
sms_min_severity: critical
send_daily_success_summary: true
send_on_failure: true
send_on_zero_promotions: true
send_on_monitoring_warnings: true
send_on_kill_switch_recommendations: true
monitoring_warning_threshold: 1
