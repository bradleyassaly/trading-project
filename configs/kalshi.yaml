# Kalshi prediction market trading configuration
# All credentials come from .env — never hardcode them here.
#
# Optional auth override example if you prefer file-based local config wiring:
auth:
   api_key_id: "66dd61a1-acf6-41ee-b75c-4732ddacbf75"
   private_key_path: "C:/Users/bradl/PycharmProjects/trading_platform/.kalshi/private_key.pem"
  #   # private_key_pem: "-----BEGIN RSA PRIVATE KEY-----\n...\n-----END RSA PRIVATE KEY-----"
# `private_key_pem` takes precedence over `private_key_path` when both are set.

environment:
  demo: false  # Historical data reads always use production endpoints; demo only affects order placement.



ingestion:
  # Markets to track for live orderbook polling and trade history
  tracked_series: []       # e.g. ["PRES-24", "INFL-24"]
  tracked_tickers: []      # e.g. ["PRES-24-D.TR", "HIGHNY-23DEC31-T40"]
  default_market_status: "open"
  orderbook_depth: 10      # price levels to fetch per side
  orderbook_poll_interval_sec: 5

  # Historical backfill settings
  backfill_days: 365       # how many days back to ingest on first run

recent_ingest:
  recent_ingest_enabled: true
  recent_ingest_statuses:
    - "settled"
  recent_ingest_categories: []
  recent_ingest_limit: 200  # Total live /markets records to fetch across pagination; set <= 0 to disable the cap.
  min_volume: 0
  exclude_market_type_patterns:
    - "CROSSCATEGORY"
    - "SPORTSMULTIGAME"
    - "EXTENDED"
  preferred_research_ingest_mode: "live_recent_filtered"
  direct_historical_tickers: []
  # Leave empty for the default research path so recent-ingest runs category-first.
  # When explicit series are supplied, recent-ingest infers a compatible category
  # from the groups below and ignores conflicting category filters.
  recent_ingest_series_tickers: []
  economics_series:
    - "KXINFL"
    - "KXFED"
    - "KXGDP"
    - "KXJOBS"
    - "KXPCE"
    - "KXCPI"
  politics_series:
    - "KXPRESAPPROVAL"
    - "KXSENATE"
  recent_ingest_event_tickers: []
  authenticated_request_sleep_sec: 0.15
  authenticated_rate_limit_max_retries: 6
  authenticated_rate_limit_backoff_base_sec: 1.0
  authenticated_rate_limit_backoff_max_sec: 20.0
  authenticated_rate_limit_jitter_max_sec: 0.5

historical_ingest:
  feature_period: "1h"
  status_artifacts_root: "artifacts/kalshi_ingest"
  authenticated_request_sleep_sec: 0.15
  authenticated_rate_limit_max_retries: 6
  authenticated_rate_limit_backoff_base_sec: 1.0
  authenticated_rate_limit_backoff_max_sec: 20.0
  authenticated_rate_limit_jitter_max_sec: 0.5
  max_live_pages_without_retained_markets: 60
  max_raw_markets_without_processing: 500
  resume_cursor_max_retries: 3
  resume_cursor_backoff_base_sec: 1.0
  resume_cursor_backoff_max_sec: 10.0
  resume_cursor_jitter_max_sec: 0.5
  resume_recovery_mode: automatic

  # ── Market filtering ───────────────────────────────────────────────────────
  # Kalshi creates hundreds of bracket markets per event (e.g. BTC price at
  # every $250 increment, NBA scores at every point).  These settings prevent
  # the ingest from downloading millions of useless files.

  # Skip any series whose ticker prefix matches one of these patterns.
  # Uses Python re.search (case-insensitive), so "KXBTC" matches
  # "KXBTC-25MAR21-T95000" and any other KXBTC bracket.
  excluded_series_patterns:
    - "KXBTC"     # Bitcoin price brackets
    - "KXETH"     # Ethereum price brackets
    - "KXSOL"     # Solana price brackets
    - "KXSPY"     # S&P 500 / SPY price brackets
    - "KXNBA"     # NBA game score brackets
    - "KXNFL"     # NFL game score brackets

  # Skip events that contain more than this many markets.
  # Legitimate single-question events have 1–3 markets; bracket
  # events have 50–500.  Set to 0 to disable.
  max_markets_per_event: 5

  # Skip markets traded fewer than this many contracts total.
  # Illiquid / untraded markets add noise without signal.  Set to 0 to disable.
  min_volume: 0

  # Only download markets in these categories during explicit archive scans.
  # Recent Economics / Politics research should prefer `data kalshi recent-ingest`.
  # Kalshi category strings (verified via GET /events?limit=200, 2026-04-02):
  #   Economics, Financials, Politics, Elections, Climate and Weather,
  #   Entertainment, Sports, Companies, Science and Technology, Health,
  #   Social, World, Crypto, Transportation
  preferred_categories:
    - "Economics"          # CPI, Fed rate decisions, GDP, jobs reports
   # - "Financials"         # IPO / company financial events
    #- "Politics"           # Executive actions, legislation, approval ratings
    #- "Elections"          # Electoral contests at all levels
   # - "Climate and Weather"  # Weather events, temperature records

  # When true, skip /historical/markets pagination entirely.
  # Use with use_events_for_category_filter=true so market discovery
  # goes through /events?category=X only — no historical archive scan.
  skip_historical_pagination: true
  use_events_for_category_filter: true

  # Fetch these series directly via series_ticker API param (fast path).
  # Falls back to full pagination (capped at 50 pages) if fewer than 20
  # markets are returned.
  # NOTE: The Kalshi /events?category=X and /markets?category=X endpoints
  # do NOT filter server-side — category is ignored in API responses.
  # The direct series approach is the only reliable way to target Economics/Politics.
  use_direct_series_fetch: false
  direct_series_tickers:
    - KXINFL
    - KXFED
    - KXGDP
    - KXJOBS
    - KXPCE
    - KXCPI
    - KXPRESAPPROVAL
    - KXSENATE

data_validation:
  output_dir: "data/kalshi/validation"
  normalized_markets_path: "data/kalshi/normalized/markets.parquet"
  normalized_trades_path: "data/kalshi/normalized/trades"
  normalized_candles_path: "data/kalshi/normalized/candles"
  resolution_csv_path: "data/kalshi/normalized/resolution.csv"
  ingest_summary_path: "data/kalshi/raw/ingest_summary.json"
  ingest_manifest_path: "data/kalshi/raw/ingest_manifest.json"
  ingest_checkpoint_path: "data/kalshi/raw/ingest_checkpoint.json"
  features_dir: "data/kalshi/features/real"
  thresholds:
    min_resolution_coverage_warn_pct: 0.90
    min_resolution_coverage_fail_pct: 0.75
    min_trade_coverage_warn_pct: 0.80
    min_trade_coverage_fail_pct: 0.60
    min_candle_coverage_warn_pct: 0.80
    min_candle_coverage_fail_pct: 0.60
    max_duplicate_ticker_warn_rate: 0.00
    max_duplicate_ticker_fail_rate: 0.01
    max_duplicate_market_id_warn_rate: 0.00
    max_duplicate_market_id_fail_rate: 0.01
    allowed_missing_category_warn_rate: 0.05
    allowed_missing_category_fail_rate: 0.10
    max_invalid_timestamp_warn_rate: 0.01
    max_invalid_timestamp_fail_rate: 0.05
    synthetic_markers_hard_fail: true

risk:
  max_drawdown_pct: 0.20   # kill switch triggers at 20% portfolio drawdown
  max_position_contracts: 100
  max_single_trade_contracts: 20
  max_open_orders: 50

execution:
  default_time_in_force: "good_till_canceled"
  post_only: false          # true = maker-only (no taker fees)

strategy:
  # Starting ideas to explore — see docs/kalshi_strategy_ideas.md
  # - mean_reversion: fade extreme YES/NO prices near settlement
  # - event_driven:   trade off news/data releases (e.g. CPI, FOMC)
  # - arbitrage:      YES + NO should sum to ~$1.00; exploit deviations
  # - liquidity:      provide quotes on illiquid markets for spread capture
  active: []

monitoring:
  log_all_orders: true
  log_all_fills: true
  pnl_report_interval_sec: 60
