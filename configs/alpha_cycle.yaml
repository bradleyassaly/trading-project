stages:
  refresh: true
  research: true
  promotion: true
  portfolio: true
  export_bundle: true
  report: true

configs:
  # The refresh config can reuse a local SEC snapshot so repeated cycle runs do not refetch fundamentals.
  refresh_config: configs/research_input_refresh.yaml
  research_config: configs/alpha_research.yaml
  promotion_policy_config: configs/promotion.yaml
  # Conditional runtime activation is controlled by the referenced strategy portfolio policy.
  strategy_portfolio_policy_config: configs/strategy_portfolio.yaml

paths:
  output_root: artifacts/alpha_cycle

run:
  run_name: canonical_alpha_cycle

mode:
  strict_mode: true
  best_effort_mode: false

promotion:
  top_n: 5
  allow_overwrite: true
  inactive: false
  override_validation: false

portfolio:
  lifecycle: null

tracking:
  database_enabled: false
  database_url:
  database_schema:
  write_candidates: true
  write_metrics: true
  write_promotions: true
