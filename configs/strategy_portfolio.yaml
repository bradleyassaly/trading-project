schema_version: 1
min_active_strategies: 1
max_active_strategies: 4
max_strategies: 4
max_strategies_per_signal_family: 3
max_strategies_per_universe: 2
max_weight_per_strategy: 0.5
min_weight_per_strategy: 0.1
selection_metric: ranking_value
strategy_weight_metric: ranking_value
strategy_weighting_mode: conditional_aware
# Supported weighting modes:
# - equal / equal_weight
# - metric_proportional / metric_weighted
# - capped_metric_weighted
# - inverse_count_by_signal_family
# - score_then_cap
# - risk_adjusted
# - conditional_aware
metric_weight_cap_multiple: 1.5
require_active_only: false
require_promotion_eligible_only: true
deduplicate_source_runs: true
include_conditional_strategies: true
max_conditional_strategies_total: 2
max_conditional_strategies_per_family: 2
require_baseline_for_conditional: true
conditional_weight_multiplier: 0.75
conditional_selection_mode: separate_bucket
evaluate_conditional_activation: true
activation_context_sources:
  - regime
  - benchmark_context
include_inactive_conditionals_in_output: true
allow_conditional_variant_siblings: true
conditional_variant_score_bonus: 0.05
diversification_dimension: signal_family
fallback_equal_weight_mode: true
warn_on_same_family_overlap: true
notes: Build a conservative paper-stage portfolio from promoted strategies.
tags:
  - strategy_portfolio
  - paper
