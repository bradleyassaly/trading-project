paths:
  feature_path: data/features
  output_dir: artifacts/alpha_research/run_configured

selection:
  universe: nasdaq100

signals:
  # Hybrid families blend slow-moving transformed fundamentals with faster technical context.
  families: [momentum,fundamental_quality_value_momentum,fundamental_momentum,fundamental_value_momentum,fundamental_quality_value_momentum]
  # Use families for a single merged research run across multiple signal families.
  # families: [cross_sectional_momentum, fundamental_quality_value, fundamental_quality_value_momentum]
  candidate_grid_preset: broad_v1
  signal_composition_preset: composite_v1
  max_variants_per_family: 6
  lookbacks: [5, 10, 20, 60]
  horizons: [1, 5, 20]
  min_rows: 126
  equity_context_enabled: true
  equity_context_include_volume: true
  fundamentals_enabled: true
  fundamentals_daily_features_path: data/fundamentals/daily_fundamental_features.parquet

portfolio:
  top_quantile: 0.2
  bottom_quantile: 0.2
  train_size: 756
  test_size: 63
  portfolio_top_n: 10
  long_quantile: 0.2
  short_quantile: 0.2
  commission: 0.0
  slippage_bps_per_turnover: 0.0
  slippage_bps_per_adv: 10.0

liquidity:
  min_price: 5.0
  min_avg_dollar_volume: 1000000.0
  max_adv_participation: 0.05
  max_position_pct_of_adv: 0.1

dynamic:
  recent_quality_window: 20
  min_history: 5
  downweight_mean_rank_ic: 0.01
  deactivate_mean_rank_ic: -0.02

regime:
  enabled: true
  min_history: 5
  underweight_mean_rank_ic: 0.01
  exclude_mean_rank_ic: -0.01

ensemble:
  enabled: false
  mode: disabled
  weight_method: equal
  normalize_scores: rank_pct
  max_members: 5

runtime:
  require_runtime_computability_for_approval: true
  min_runtime_computable_symbols_for_approval: 5
  allow_research_only_noncomputable_candidates: false
  runtime_computability_penalty_on_ranking: 0.05
  runtime_computability_check_mode: strict

refresh:
  fast_refresh_mode: false
  skip_heavy_diagnostics: true
  reuse_existing_fold_results: true
  restrict_to_existing_candidates: true
  max_families_for_refresh: 4
  max_candidates_for_refresh: 250

tracking:
  database_enabled: true
  database_url: postgresql+psycopg://postgres:postgres@localhost:5432/trading_platform
  database_schema: research
  write_candidates: true
  write_metrics: true
  write_promotions: true
