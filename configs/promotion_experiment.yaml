schema_version: 1
metric_name: portfolio_sharpe
min_metric_threshold: 0.0
min_folds_tested: 2
min_promoted_signals: 1
bootstrap_mode: true
allow_first_promotion_without_history: true
require_validation_pass: false
allow_weak_validation: true
max_strategies_total: 2
max_strategies_per_group: 1
max_strategies_per_family: 2
group_by: signal_family
require_eligible_candidates: false
default_status: inactive
pipeline_monitoring_config_path: configs/monitoring.yaml
pipeline_execution_config_path: configs/execution.yaml
enable_conditional_variants: true
emit_conditional_variants_alongside_baseline: true
conditional_variant_allowance: 2
conditional_variant_score_bonus: 0.05
allowed_condition_types:
  - regime
  - benchmark_context
  - sub_universe
min_condition_sample_size: 20
min_condition_improvement: 0.01
compare_condition_to_unconditional: true
require_runtime_computable_scores: true
min_runtime_computable_symbols: 5
allow_shadow_promotion_on_runtime_failure: true
notes: Experiment-only promotion policy for fast local-debug campaigns. Intended to increase downstream experiment activity without changing operating defaults.
tags:
  - experiment_only
  - fast_debug
