crypto:
  binance:
    provider:
      symbols:
        - BTCUSDT
        - ETHUSDT
      intervals:
        - 1m
        - 5m
      request_sleep_sec: 0.1
      max_retries: 5
      backoff_base_sec: 0.5
      backoff_max_sec: 8.0
    historical_ingest:
      start: "2024-01-01T00:00:00Z"
      end: null
      kline_limit: 1000
      agg_trade_limit: 1000
      capture_book_ticker: true
      normalize_after_ingest: true
    websocket:
      enabled: false
      stream_families:
        - kline
        - agg_trade
        - book_ticker
      combined_stream: true
      base_url: wss://data-stream.binance.vision
      max_streams_per_connection: 1024
      ping_interval_sec: 20.0
      ping_timeout_sec: 20.0
      receive_timeout_sec: 30.0
      reconnect_backoff_base_sec: 1.0
      reconnect_backoff_max_sec: 30.0
      max_reconnect_attempts: 10
      max_runtime_seconds: null
      max_messages: null
      refresh_projection_after_ingest: true
    features:
      features_root: data/binance/features
      feature_store_root: data/feature_store
      summary_path: data/binance/features/feature_refresh_summary.json
      return_horizons:
        - 1
        - 5
        - 15
      volatility_windows:
        - 5
        - 15
        - 30
      volume_windows:
        - 5
        - 15
        - 30
      order_book_windows:
        - 5
        - 15
      trade_intensity_windows:
        - 5
        - 15
      rebuild_lookback_rows: 5000
      incremental_refresh: true
    sync:
      symbols: []
      intervals: []
      stream_families: []
      max_runtime_seconds: 60
      max_messages: 250
      skip_projection: false
      skip_features: false
      full_feature_rebuild: false
      summary_path: data/binance/sync/sync_summary.json
      manifest_root: data/binance/sync/manifests
      latest_manifest_path: data/binance/sync/latest_sync_manifest.json
    status:
      symbols: []
      intervals: []
      summary_path: data/binance/status/binance_status.json
      projection_staleness_threshold_sec: 300
      feature_staleness_threshold_sec: 900
    research:
      output_root: data/binance/research
      summary_path: data/binance/research/dataset_summary.json
      symbols: []
      intervals: []
      start: null
      end: null
      target_horizons:
        - 1
        - 5
    registry:
      enabled: true
      path: data/research/dataset_registry.json
      dataset_key: binance.crypto_market_features
      dataset_name: crypto_market_features
      asset_class: crypto
      schema_version: binance_research_dataset_v1
    alerts:
      output_root: data/binance/monitoring/alerts
      summary_path: data/binance/monitoring/alerts/alerts_summary.json
      symbols: []
      intervals: []
      latest_sync_max_age_sec: 900
      require_sync_status_completed: true
      missing_scope_severity: critical
    health:
      output_root: data/binance/monitoring/health
      summary_path: data/binance/monitoring/health/health_check.json
      symbols: []
      intervals: []
      latest_sync_max_age_sec: 900
      require_feature_scopes: true
      require_projection_scopes: true
    notify:
      enabled: false
      output_root: data/binance/monitoring/notifications
      summary_path: data/binance/monitoring/notifications/notify_summary.json
      state_path: data/binance/monitoring/notifications/notify_state.json
      notification_config_path: null
      notify_on_warning: true
      notify_on_critical: true
      notify_on_recovery: true
      transition_only: true
      duplicate_suppression_window_sec: 3600
      subject_prefix: Trading Platform Binance
    outputs:
      raw_root: data/binance/raw
      normalized_root: data/binance/normalized
      checkpoint_path: data/binance/raw/ingest_checkpoint.json
      summary_path: data/binance/raw/ingest_summary.json
      exchange_info_path: data/binance/raw/exchange_info.json
      raw_incremental_root: data/binance/raw/websocket
      normalized_incremental_root: data/binance/normalized/incremental
      websocket_checkpoint_path: data/binance/raw/websocket_checkpoint.json
      websocket_summary_path: data/binance/raw/websocket_summary.json
      projection_output_root: data/binance/projections
