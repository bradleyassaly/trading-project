selection:
  universe: nasdaq100
  sub_universe_id: liquid_trend_candidates

feature_groups:
  - trend
  - volatility
  - momentum
  - volume

outputs:
  feature_dir: data/features
  metadata_dir: data/metadata
  normalized_dir: data/normalized

reference_data:
  root: artifacts/reference_data/v1
  membership_history_path: artifacts/reference_data/v1/universe_membership_history.csv
  taxonomy_snapshot_path: artifacts/reference_data/v1/taxonomy_snapshots.csv
  benchmark_mapping_path: artifacts/reference_data/v1/benchmark_mapping_snapshots.csv
  market_regime_path: artifacts/regime
  benchmark: SPY

failure_handling:
  policy: partial_success

fundamentals:
  enabled: true
  artifact_root: data/fundamentals
  providers:
    - sec
  daily_features_path: data/fundamentals/daily_fundamental_features.parquet
  # Recommended primary path: build or refresh the SEC local snapshot first, then reuse it here.
  sec_companyfacts_root: data/fundamentals/raw_sec/companyfacts
  sec_submissions_root: data/fundamentals/raw_sec/submissions
  # Optional supplemental vendor path. Keep disabled unless you intentionally want to augment SEC coverage.
  vendor_api_key: null
  vendor_file_path: null
  vendor_cache_enabled: true
  vendor_cache_root: data/fundamentals/raw_fmp
  vendor_cache_ttl_hours: 24
  vendor_force_refresh: false
  vendor_request_delay_seconds: 0.5
  vendor_max_retries: 4
  vendor_max_symbols_per_run: 25
  vendor_max_requests_per_run: 175
