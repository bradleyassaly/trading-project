name: smoke

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run smoke test
        run: python -m pytest tests/test_end_to_end_smoke.py

      - name: Run doctor
        run: |
          trading-cli doctor \
            --artifacts-root artifacts \
            --monitoring-config configs/monitoring.yaml \
            --execution-config configs/execution.yaml \
            --broker-config configs/broker.yaml \
            --dashboard-config configs/dashboard.yaml \
            --output-dir artifacts/system_check_ci
